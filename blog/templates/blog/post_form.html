{% extends 'base.html' %}

{% block content %}

<div class="max-w-5xl mx-auto mt-10 bg-white p-8 rounded-lg shadow">

    <h2 class="text-4xl font-bold text-center mb-10">
    {% if object %}
        Update Post
    {% else %}
        Create Post
    {% endif %}
</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-6">
            <label class="block mb-2 font-semibold">
                Title
            </label>
            {{ form.title }}
        </div>

        <div class="mb-6">
            <label class="block mb-2 font-semibold">
                Category
            </label>
            {{ form.category }}
        </div>

        <div class="mb-6">
            <label class="block mb-2 font-semibold">
                Content
            </label>
            {{ form.content }}
        </div>

        <div class="mb-6">
            <label class="block mb-2 font-semibold">
                Featured Image
            </label>
            {{ form.image }}
        </div>

        <div class="mb-8">
            <label class="flex items-center gap-3 font-semibold">
                {{ form.is_published }}
                <span>Publish Post</span>
            </label>
        </div>

       <button
    type="submit"
    class="bg-gray-900 text-white px-6 py-3 rounded hover:bg-gray-700 transition"
>
    {% if object %}
        Update Post
    {% else %}
        Create Post
    {% endif %}
</button>

    </form>

</div>

{% endblock %}
