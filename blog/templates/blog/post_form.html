{% extends 'base.html' %}

{% block content %}

<div class="max-w-4xl mx-auto bg-blue rounded-xl shadow-lg p-8"">

    <h2 class="text-4xl font-medium text-white-700 text-center mb-10">
    {% if object %}
        Update Post
    {% else %}
        Create Post
    {% endif %}
</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-6">
            <label class="block mb-2 text-sm font-semibold text-slate-300">
                Title
            </label>
            {{ form.title }}
        </div>

        <div class="mb-6">
            <label class="block mb-2 text-sm font-semibold text-slate-300">
                Category
            </label>
            {{ form.category }}
        </div>

        <div class="mb-6">
            <label class="block mb-2 text-sm font-semibold text-slate-300">
                Content
            </label>
            {{ form.content }}
        </div>

        <div class="mb-6">
            <label class="block mb-2 text-sm font-semibold text-slate-300">
                Featured Image
            </label>
            {{ form.image }}
        </div>

        <div class="mb-8">
            <label class="flex items-center gap-3 font-medium text-slate-700 mb-2">
                {{ form.is_published }}
                <span>Publish Post</span>
            </label>
        </div>

       <button
    type="submit"
    class="mt-6 bg-blue-500 hover:bg-blue-600 text-white font-semibold px-6 py-3 rounded-lg shadow-lg transition-all duration-300 hover:-translate-y-1"
>
    {% if object %}
        Update Post
    {% else %}
        Create Post
    {% endif %}
</button>

    </form>

</div>

{% endblock %}
