{% extends "base.html" %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12">
<form method="POST" class="w-full max-w-md bg-slate-900/70 border border-slate-700 p-8 rounded-2xl shadow-xl">
    {% csrf_token %}

 <h2 class="text-3xl font-bold text-white mb-8 text-center">
    Register
</h2>

    <div class="mb-4">
        <label class="block mb-2 text-slate-300 font-medium">Username</label>
        {{ form.username }}
    </div>

    <div class="mb-4">
        <label class="block mb-2 text-slate-300 font-medium">Email</label>
        {{ form.email }}
    </div>

    <div class="mb-4">
        <label class="block mb-2 text-slate-300 font-medium">Password</label>
        {{ form.password1 }}
    </div>

    <div class="mb-4">
        <label class="block mb-2 text-slate-300 font-medium">Confirm Password</label>
        {{ form.password2 }}
    </div>

<button
    type="submit"
    class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-lg font-semibold transition-all duration-300"
>
    Register
</button>
<p class="text-center text-slate-400 mt-6">
    Already have an account?
    <a href="{% url 'accounts:login' %}" class="text-blue-400 hover:text-blue-300">
        Login
    </a>
</p>
</form>
</div>

{% endblock %}
