{% extends 'base.html' %}

{% block content %}

<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-lg shadow">

    <h2 class="text-2xl font-bold text-center mb-6">
        Login
    </h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-4">
            <label class="block mb-2 font-medium">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <div class="mb-4">
            <label class="block mb-2 font-medium">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <button
            type="submit"
            class="w-full bg-gray-900 text-white py-2 rounded hover:bg-gray-700"
        >
            Login
        </button>

    </form>

</div>

{% endblock %}
