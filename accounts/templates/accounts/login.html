{% extends 'base.html' %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-md bg-slate-900/70 border border-slate-700 p-8 rounded-2xl shadow-xl">

    <h2 class="text-3xl font-bold text-center text-white mb-8">
        Login
    </h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-4">
            <label class="block mb-2 text-slate-300 font-medium">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="w-full border border-slate-600 bg-slate-900 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <div class="mb-4">
            <label class="block mb-2 text-slate-300 font-medium">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="w-full border border-slate-600 bg-slate-900 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <button
            type="submit"
            class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-lg font-semibold transition-all duration-300"
        >
            Login
        </button>
        <p class="text-center text-slate-400 mt-6">
    Don't have an account?
    <a href="{% url 'accounts:register' %}" class="text-blue-400 hover:text-blue-300">
        Register
    </a>
</p>

    </form>

</div>

{% endblock %}
