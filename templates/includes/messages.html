{% if messages %}
    {% for message in messages %}
        <div class="message-alert max-w-4xl mx-auto mt-4 p-4 rounded-lg bg-green-100 text-green-800 shadow">
            {{ message }}
        </div>
    {% endfor %}
    <script>
        setTimeout(function () {
            let messages = document.querySelectorAll('.message-alert');
            messages.forEach(function (message) {
                message.style.display = 'none';
            });
        }, 3000);
    </script>
{% endif %}
